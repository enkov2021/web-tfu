<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Pasien - Klinik Mutiara Agma</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    :root {
      --primary:    #e91e63;
      --primary-dark:#c2185b;
      --accent:     #ff80ab;
      --light-pink: #fce4ec;
      --text-dark:  #4a148c;
    }

    body {
      background: var(--light-pink);
      color: #333;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    .header {
      background: linear-gradient(135deg, #ad1457 0%, var(--primary) 100%);
      color: white;
      padding: 1.6rem 1rem 2rem;
      text-align: center;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 4px 18px rgba(233,30,99,0.28);
    }

    .header i {
      font-size: 2.8rem;
      margin-bottom: 0.8rem;
      color: #ff80ab;
    }

    .header h1 {
      font-size: 1.8rem;
      margin: 0.3rem 0;
      font-weight: 700;
    }

    .header .subtitle {
      font-size: 0.95rem;
      opacity: 0.92;
      margin: 0.2rem 0 0.6rem;
    }

    .clinic-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .main-container {
      padding: 1.4rem 1rem;
      max-width: 560px;
      margin: 0 auto;
    }

    .form-card {
      background: white;
      border-radius: 20px;
      padding: 1.6rem 1.3rem;
      box-shadow: 0 6px 22px rgba(233,30,99,0.16);
      border: 1px solid #f8bbd0;
    }

    .form-title {
      color: var(--primary);
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      padding-bottom: 0.7rem;
      border-bottom: 3px solid var(--accent);
      text-align: center;
    }

    .form-label {
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 0.45rem;
      font-size: 0.95rem;
    }

    .form-control {
      border: 2px solid #f8bbd0;
      border-radius: 12px;
      padding: 0.7rem 1rem;
      font-size: 1rem;
      height: 46px;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 0.25rem rgba(233,30,99,0.15);
    }

    .input-group-text {
      border: 2px solid #f8bbd0;
      border-radius: 12px;
      background: #fff0f5;
      font-size: 0.95rem;
    }

    .required::after {
      content: " *";
      color: #c2185b;
    }

    .btn-submit {
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 14px;
      padding: 0.85rem;
      font-size: 1.08rem;
      font-weight: 600;
      margin-top: 1.5rem;
      box-shadow: 0 4px 16px rgba(233,30,99,0.35);
      transition: all 0.25s;
      height: 52px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(233,30,99,0.45);
    }

    .alert-message {
      border-radius: 12px;
      padding: 0.9rem;
      margin-bottom: 1.4rem;
      font-size: 0.95rem;
      display: none;
    }

    .alert-success { background:#e8f5e9; color:#1b5e20; border-left:5px solid #2e7d32; }
    .alert-danger  { background:#ffebee; color:#b71c1c; border-left:5px solid #c62828; }

    footer {
      text-align: center;
      padding: 1.6rem 1rem;
      color: #555;
      font-size: 0.82rem;
      background: rgba(255,255,255,0.5);
      border-top: 1px solid #f8bbd0;
      margin-top: auto;
    }

    @media (min-width: 576px) {
      .main-container { padding: 2rem 1.5rem; }
      .form-card { padding: 2rem 1.8rem; }
      .header h1 { font-size: 2.1rem; }
    }
  </style>
</head>
<body>

  <header class="header">
    <i class="fas fa-heartbeat"></i>
    <h1>Database Pasien</h1>
    <p class="subtitle">Pencatatan Data Kebidanan & Kehamilan</p>
    <div class="clinic-name">
      <i class="fas fa-clinic-medical me-2"></i>Klinik Pratama Mutiara Agma
    </div>
  </header>

  <div class="main-container">
    <div class="form-card">
      <div id="successMessage" class="alert-message alert-success">
        <i class="fas fa-check-circle me-2"></i><strong>Berhasil!</strong> Data tersimpan.
      </div>

      <div id="errorMessage" class="alert-message alert-danger">
        <i class="fas fa-exclamation-circle me-2"></i><strong>Gagal!</strong> Coba lagi ya.
      </div>

      <h2 class="form-title">
        <i class="fas fa-baby-carriage me-2"></i>Input Data Pasien
      </h2>

      <form id="patientForm" method="POST" action="https://script.google.com/macros/s/AKfycbyqoDmcx7vzmgY8kRf94hCS41Be2bJttx0k9nsPCJCp5GbHQKK9P5FPxA6lfoOup6EVsw/exec">
        
        <div class="mb-3">
          <label for="bidanName" class="form-label required">Nama Bidan</label>
          <input type="text" class="form-control" id="bidanName" name="bidanName" required placeholder="Nama lengkap bidan">
        </div>

        <div class="mb-3">
          <label for="patientName" class="form-label required">Nama Pasien</label>
          <input type="text" class="form-control" id="patientName" name="patientName" required placeholder="Nama lengkap pasien">
        </div>

        <div class="row g-3">
          <div class="col-4">
            <label for="patientAge" class="form-label required">Umur</label>
            <div class="input-group">
              <input type="number" class="form-control" id="patientAge" name="patientAge" min="15" max="60" required>
              <span class="input-group-text">th</span>
            </div>
          </div>
          <div class="col-4">
            <label for="pregnancyAge" class="form-label required">Usia Hamil</label>
            <div class="input-group">
              <input type="number" class="form-control" id="pregnancyAge" name="pregnancyAge" min="1" max="42" required>
              <span class="input-group-text">mg</span>
            </div>
          </div>
          <div class="col-4">
            <label for="pregnancyNumber" class="form-label required">Hamil ke</label>
            <input type="number" class="form-control" id="pregnancyNumber" name="pregnancyNumber" min="1" max="15" required>
          </div>
        </div>

        <button type="submit" class="btn btn-submit w-100">
          <i class="fas fa-save me-2"></i>Simpan Data
        </button>
      </form>
    </div>
  </div>


  <script>
    const form = document.getElementById('patientForm');
    const successMsg = document.getElementById('successMessage');
    const errorMsg = document.getElementById('errorMessage');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      if (!form.checkValidity()) {
        alert('Mohon lengkapi semua kolom bertanda bintang ya~');
        form.reportValidity();
        return;
      }

      const btn = form.querySelector('.btn-submit');
      const original = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-heart fa-beat me-2"></i>Menyimpan...';
      btn.disabled = true;

      fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        mode: 'no-cors'
      })
      .then(() => {
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
        form.reset();
        setTimeout(() => successMsg.style.display = 'none', 6000);
      })
      .catch(() => {
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
      })
      .finally(() => {
        btn.innerHTML = original;
        btn.disabled = false;
      });
    });
  </script>
</body>
</html>
